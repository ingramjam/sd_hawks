<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
    <title>Bingo</title>
    <style>
        .header {
            background-color: navy;

    <p>This is a fun game to enjoy with friends and family.</p>

</html>
