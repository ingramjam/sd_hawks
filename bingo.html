<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>San Diego Hawks Game Bingo</title>
    <style>
        :root {
            --primary: #002244; --secondary: #FFD700; --bg: #f4f4f4;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 0; }
        .banner-bar { background: #002244; width: 100%; text-align: center; border-bottom: 4px solid var(--secondary); margin-bottom: 10px; }
        .header-img { max-width: 500px; max-height: 200px; width: 100%; height: auto; display: block; margin: 0 auto; }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .back-link { display: inline-block; margin-bottom: 15px; color: var(--primary); text-decoration: none; font-weight: bold; font-size: 0.9rem; background: #e0e0e0; padding: 8px 14px; border-radius: 20px; }
        .back-link:hover { background: #ccc; }
        h2 { color: var(--primary); margin: 0 0 10px 0; text-align: center; }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; width: 100%; background: var(--primary); border: 3px solid var(--secondary); padding: 3px; border-radius: 8px; }
        .bingo-square { background: #fff; padding: 2px; text-align: center; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; aspect-ratio: 1/1; border-radius: 2px; cursor: pointer; }
        .bingo-square.checked { background: var(--secondary); color: var(--primary); }
        .center-square { background-image: url("https://www.sandiegohawks.com/uploads/1/2/6/9/126967866/editor/hawks-logo-1_1.png"); background-size: 80%; background-repeat: no-repeat; background-position: center; background-color: white; pointer-events: none; }
        .action-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 15px; background: var(--secondary); color: var(--primary); }
        .donate-link { display: inline-block; color: var(--primary); text-decoration: none; font-weight: bold; font-size: 0.9rem; background: var(--secondary); padding: 8px 14px; border-radius: 20px; }
        .donate-link:hover { background: #e6c200; }
    </style>
</head>
<body>
<div class="banner-bar">
    <img src="https://raw.githubusercontent.com/ingramjam/sd_hawks/main/hawks_banner.jpg" alt="Hawks Header" class="header-img">
</div>
<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <a href="index.html" class="back-link">← Back</a>
        <a href="https://venmo.com/u/jwyld" target="_blank" class="donate-link">💛 Donate to the cause</a>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center;">
        <h2>Game Time Bingo!</h2>
        <div class="bingo-card" id="bingoCard"></div>
        <button class="action-btn" id="bingoResetBtn">New Card</button>
    </div>
</div>
<script>
    const baseballTerms = [ "Home Run", "My Kid Strikes Out", "Walk-In Run", "Out", "Foul Ball Out", "Double", "Coach crashes out", "Triple", "Grand Slam", "Walk", "Pitcher Cries", "Fan hit by foul ball", "Catcher Cries", "Drop 3rd Strike", "Gopher Hole", "My Kid Scored", "Pick Off", "Steal", "Error", "RBI", "Parent Kicked Out", "Terrible Call", "Tie Shoes", "Hit By Pitch", "No Glove On", "Oven Mitt", "No Game Balls", "Wild Pitch", "Balk", "Passed Ball", "Infield Fly", "Mound Visit", "Pinch Runner", "Intentional Walk", "Pop Up Out" ];

    function createBingoCard(terms) {
        const bingoCard = document.getElementById('bingoCard');
        bingoCard.innerHTML = '';
        let idx = 0;
        for (let r = 0; r < 5; r++) {
            for (let c = 0; c < 5; c++) {
                const sq = document.createElement('div');
                sq.classList.add('bingo-square');
                if (r === 2 && c === 2) {
                    sq.classList.add('center-square');
                } else {
                    sq.textContent = terms[idx++];
                    sq.onclick = () => sq.classList.toggle('checked');
                }
                bingoCard.appendChild(sq);
            }
        }
    }

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function newBingoCard() {
        const arr = shuffle(baseballTerms);
        localStorage.setItem('hawksBingoTerms', JSON.stringify(arr.slice(0, 24)));
        createBingoCard(arr.slice(0, 24));
    }

    function initBingo() {
        const savedTerms = localStorage.getItem('hawksBingoTerms');
        if (savedTerms) createBingoCard(JSON.parse(savedTerms)); else newBingoCard();
        document.getElementById('bingoResetBtn').addEventListener('click', newBingoCard);
    }

    initBingo();
</script>
</body>
</html>
